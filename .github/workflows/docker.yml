name: Build and Push Docker Images

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./judgels-backends
          file: ./judgels-backends/judgels-server-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/hamgarian/judgels-himalkom/server:latest

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./judgels-client
          file: ./judgels-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/hamgarian/judgels-himalkom/client:latest

      - name: Build and push grader
        uses: docker/build-push-action@v5
        with:
          context: ./judgels-backends
          file: ./judgels-backends/judgels-grader-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/hamgarian/judgels-himalkom/grader:latest