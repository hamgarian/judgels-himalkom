name: Build and Push Docker Images

on:
  push:
    branches: [master]

jobs:
  check-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: judgels-client/package-lock.json
      - name: Install dependencies
        working-directory: judgels-client
        run: npm ci --legacy-peer-deps
      - name: Build
        working-directory: judgels-client
        run: npm run build

  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build server
        working-directory: judgels-backends
        run: ./gradlew :judgels-server-app:distTar --no-daemon
      - name: Build grader
        working-directory: judgels-backends
        run: ./gradlew :judgels-grader-app:distTar --no-daemon

  check-grader-dockerfile-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Test grader Dockerfile on native arm64
        run: |
          docker build \
            --file ./judgels-backends/judgels-grader-app/Dockerfile \
            --no-push \
            ./judgels-backends

  build-client:
    needs: check-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./judgels-client
          file: ./judgels-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/hamgarian/judgels-himalkom/client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  build-server:
    needs: check-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./judgels-backends
          file: ./judgels-backends/judgels-server-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/hamgarian/judgels-himalkom/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-grader:
    needs: [check-backend, check-grader-dockerfile-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push grader
        uses: docker/build-push-action@v5
        with:
          context: ./judgels-backends
          file: ./judgels-backends/judgels-grader-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/hamgarian/judgels-himalkom/grader:latest
          cache-from: type=gha,scope=grader
          cache-to: type=gha,mode=max,scope=grader
