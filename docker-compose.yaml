version: "3.8"

services:
  judgels-server:
    build:
      context: ./judgels-backends
      dockerfile: judgels-server-app/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_RABBITMQ_HOST=${RMQ_HOST}
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASSWORD}
      - JUDGELS_URLS_CLIENT=${URL_CLIENT}
      - JUDGELS_URLS_API=${URL_API}
      - JUDGELS_URLS_ADMIN=${URL_ADMIN}
    volumes:
      - judgels-data:/var/judgels
    restart: always

  judgels-client:
    build:
      context: ./judgels-client
      dockerfile: Dockerfile
    environment:
      - API_URL=${URL_API}
    restart: always

  judgels-grader:
    build:
      context: ./judgels-backends
      dockerfile: judgels-grader-app/Dockerfile
    privileged: true
    environment:
      - SPRING_RABBITMQ_HOST=${RMQ_HOST}
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASSWORD}
      - JUDGELS_GRADER_API_URL=${URL_API}
    volumes:
      - grader-data:/var/judgels/grader
    restart: always

volumes:
  judgels-data:
  grader-data: