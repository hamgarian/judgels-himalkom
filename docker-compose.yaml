version: "3.8"
services:
  mysql:
    image: mysql:8
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"${DB_ROOT_PASSWORD}\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  judgels-server:
    image: ghcr.io/hamgarian/judgels-himalkom/server:latest
    pull_policy: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASSWORD}
      - JUDGELS_URLS_CLIENT=${URL_CLIENT}
      - JUDGELS_URLS_API=${URL_API}
      - JUDGELS_URLS_ADMIN=${URL_ADMIN}
    volumes:
      - judgels-data:/var/judgels
    restart: always

  judgels-client:
    image: ghcr.io/hamgarian/judgels-himalkom/client:latest
    pull_policy: always
    environment:
      - API_URL=${URL_API}
    restart: always

  judgels-grader:
    image: ghcr.io/hamgarian/judgels-himalkom/grader:latest
    pull_policy: always
    privileged: true
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASSWORD}
      - JUDGELS_GRADER_API_URL=${URL_API}
    volumes:
      - grader-data:/var/judgels/grader
      - judgels-data:/var/judgels/server:ro
    restart: always

volumes:
  judgels-data:
  grader-data:
  mysql-data:
  rabbitmq-data: